{% extends "base.html" %}
{% block title %}Log In — WanderAI{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="container">
    <div class="row justify-content-center min-vh-100 align-items-center py-5">
      <div class="col-sm-10 col-md-6 col-lg-5">
        <div class="auth-card">
          <div class="auth-header text-center mb-4">
            <a href="{{ url_for('index') }}" class="brand-link">
              <i class="bi bi-airplane-engines-fill me-2"></i>WanderAI
            </a>
            <h2 class="mt-3 mb-1">Welcome back</h2>
            <p class="text-muted small">Log in to plan your next adventure</p>
          </div>
          <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
              <label class="form-label fw-500">Email address</label>
              <div class="input-icon-wrap">
                <i class="bi bi-envelope input-icon"></i>
                <input type="email" name="email" class="form-control input-with-icon" placeholder="you@example.com" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-500">Password</label>
              <div class="input-icon-wrap">
                <i class="bi bi-lock input-icon"></i>
                <input type="password" name="password" id="password" class="form-control input-with-icon" placeholder="••••••••" required>
                <button type="button" class="btn-eye" onclick="togglePassword('password','eyeIcon')">
                  <i class="bi bi-eye" id="eyeIcon"></i>
                </button>
              </div>
            </div>
            <div class="mb-4 d-flex align-items-center justify-content-between">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="remember" id="remember">
                <label class="form-check-label small" for="remember">Remember me</label>
              </div>
            </div>
            <button type="submit" class="btn btn-accent w-100 rounded-pill py-2 fw-600">
              Log In <i class="bi bi-arrow-right ms-2"></i>
            </button>
          </form>
          <hr class="my-4">
          <p class="text-center small text-muted">
            Don't have an account? <a href="{{ url_for('register') }}" class="link-accent fw-600">Sign up free</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function togglePassword(fieldId, iconId) {
  const f = document.getElementById(fieldId);
  const i = document.getElementById(iconId);
  f.type = f.type === 'password' ? 'text' : 'password';
  i.className = f.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}
</script>
{% endblock %}
