{% extends "base.html" %}
{% block title %}Create Account — WanderAI{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="container">
    <div class="row justify-content-center min-vh-100 align-items-center py-5">
      <div class="col-sm-10 col-md-7 col-lg-5">
        <div class="auth-card">
          <div class="auth-header text-center mb-4">
            <a href="{{ url_for('index') }}" class="brand-link">
              <i class="bi bi-airplane-engines-fill me-2"></i>WanderAI
            </a>
            <h2 class="mt-3 mb-1">Create your account</h2>
            <p class="text-muted small">Start planning AI-powered trips for free</p>
          </div>
          <form method="POST" action="{{ url_for('register') }}">
            <div class="mb-3">
              <label class="form-label fw-500">Full name</label>
              <div class="input-icon-wrap">
                <i class="bi bi-person input-icon"></i>
                <input type="text" name="name" class="form-control input-with-icon" placeholder="Your name" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-500">Email address</label>
              <div class="input-icon-wrap">
                <i class="bi bi-envelope input-icon"></i>
                <input type="email" name="email" class="form-control input-with-icon" placeholder="you@example.com" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-500">Password</label>
              <div class="input-icon-wrap">
                <i class="bi bi-lock input-icon"></i>
                <input type="password" name="password" id="password" class="form-control input-with-icon" placeholder="Min. 6 characters" required minlength="6">
                <button type="button" class="btn-eye" onclick="togglePassword('password','eyeIcon1')">
                  <i class="bi bi-eye" id="eyeIcon1"></i>
                </button>
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label fw-500">Confirm password</label>
              <div class="input-icon-wrap">
                <i class="bi bi-lock-fill input-icon"></i>
                <input type="password" name="confirm_password" id="confirm_password" class="form-control input-with-icon" placeholder="Repeat password" required>
                <button type="button" class="btn-eye" onclick="togglePassword('confirm_password','eyeIcon2')">
                  <i class="bi bi-eye" id="eyeIcon2"></i>
                </button>
              </div>
            </div>
            <button type="submit" class="btn btn-accent w-100 rounded-pill py-2 fw-600">
              Create Account <i class="bi bi-arrow-right ms-2"></i>
            </button>
          </form>
          <hr class="my-4">
          <p class="text-center small text-muted">
            Already have an account? <a href="{{ url_for('login') }}" class="link-accent fw-600">Log in</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function togglePassword(fieldId, iconId) {
  const f = document.getElementById(fieldId);
  const i = document.getElementById(iconId);
  f.type = f.type === 'password' ? 'text' : 'password';
  i.className = f.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}
</script>
{% endblock %}
